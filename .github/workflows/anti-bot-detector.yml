name: 🤖 Anti-Bot & AI-Slop Detector

# ─────────────────────────────────────────────────────────────────────────────
# Detects and IMMEDIATELY CLOSES automated cron-bot, AI-slop, and
# CI-bypass exploitation attempts on issues and PRs.
#
# Known bot operators have ALL their PRs auto-closed + labeled on sight.
# No warnings — they've already been warned. Just instant closure.
#
# Detection patterns:
#  1. Known bot-operator accounts — instant close, no mercy
#  2. "auto-created by cron" in issue/PR body
#  3. "for ci bypass" in PR body or files
#  4. "generated for easemotion-css competition" in CSS files
#  5. Empty files (0 additions) submitted in a PR
#  6. Any PR that deletes .github/workflows/ or root config files
# ─────────────────────────────────────────────────────────────────────────────

on:
  issues:
    types: [opened, edited]
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  anti-bot-detector:
    name: Anti-Bot & AI-Slop Detector
    runs-on: ubuntu-latest
    steps:
      - name: Detect and Auto-Close Bot/Slop/Attack PRs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const isPR    = !!context.payload.pull_request;
            const isIssue = !!context.payload.issue;
            const item    = isPR ? context.payload.pull_request : context.payload.issue;
            if (!item) return;

            const issueNumber = item.number;
            const author      = item.user.login;
            const title       = (item.title || '').toLowerCase();
            const body        = (item.body  || '').toLowerCase();

            // ─────────────────────────────────────────────────────────────────
            // TIER 1: KNOWN BOT OPERATORS — auto-close ALL their PRs instantly
            // ─────────────────────────────────────────────────────────────────
            const KNOWN_BOT_ACCOUNTS = [
              'tmdeveloper007',          // cron-bot: 830 auto-issues + 1060 PRs, self-documented "Auto-created by cron"
              'desireddymohithreddy0925', // ci-bypass: explicitly wrote "submitted via submissions/examples/ for ci bypass"
            ];

            // ─────────────────────────────────────────────────────────────────
            // TIER 2: PATTERN DETECTION — body/file signatures
            // ─────────────────────────────────────────────────────────────────
            const BODY_SIGNATURES = [
              'auto-created by cron',
              'auto generated by cron',
              'generated by cron',
              'auto-created by bot',
              'created by bot',
              'created by script',
              'generated by script',
              'auto created by',
              'generated for easemotion-css competition',
              'for ci bypass',
              'ci bypass',
              'submitted via submissions/examples/ for ci bypass',
              'bypass the ci',
            ];

            // ─────────────────────────────────────────────────────────────────
            // CORE FRAMEWORK FILES — any PR deleting these is an attack
            // ─────────────────────────────────────────────────────────────────
            const PROTECTED_PATHS = [
              '.github/workflows/',
              '.github/ISSUE_TEMPLATE/',
              '.github/scripts/',
              '.github/PULL_REQUEST_TEMPLATE',
              '.github/CODEOWNERS',
              '.gitignore',
              '.gitattributes',
              '.editorconfig',
              'package.json',
              'package-lock.json',
            ];

            // ── Detect reason ─────────────────────────────────────────────────
            const isKnownBot  = KNOWN_BOT_ACCOUNTS.includes(author);
            const matchedSig  = BODY_SIGNATURES.find(sig => body.includes(sig));

            let hasGeneratedComment = false;
            let hasCIBypassInFiles  = false;
            let hasEmptyFiles       = false;
            let hasCoreFileDeletion = false;
            let coreFilesDeleted    = [];

            if (isPR) {
              try {
                const { data: files } = await github.rest.pulls.listFiles({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  pull_number: issueNumber,
                });

                for (const file of files) {
                  const patch    = (file.patch    || '').toLowerCase();
                  const filename = (file.filename || '').toLowerCase();

                  // AI-generated CSS/README detection
                  if (patch.includes('generated for easemotion-css competition') ||
                      patch.includes('generated:') ||
                      patch.includes('auto-generated') ||
                      patch.includes('auto generated')) {
                    hasGeneratedComment = true;
                  }

                  // CI bypass in files
                  if (patch.includes('ci bypass') || patch.includes('for ci bypass')) {
                    hasCIBypassInFiles = true;
                  }

                  // Empty-file spam (submitted but 0 bytes)
                  if (file.status === 'added' && file.additions === 0 && file.changes === 0) {
                    hasEmptyFiles = true;
                  }

                  // Core framework deletion attack
                  if (file.status === 'removed' || file.deletions > 0) {
                    const isProtected = PROTECTED_PATHS.some(p => file.filename.startsWith(p) || file.filename === p.replace(/\/$/, ''));
                    if (isProtected) {
                      hasCoreFileDeletion = true;
                      coreFilesDeleted.push(file.filename);
                    }
                  }
                }
              } catch(e) {
                console.log('Could not fetch PR files:', e.message);
              }
            }

            const isSlopDetected = isKnownBot || !!matchedSig || hasGeneratedComment
                                 || hasCIBypassInFiles || hasCoreFileDeletion;

            if (!isSlopDetected) {
              console.log(`✅ #${issueNumber} by @${author} — clean.`);
              return;
            }

            // ── Log detection reason ──────────────────────────────────────────
            const reasons = [];
            if (isKnownBot)          reasons.push(`Known bot-operator account (@${author})`);
            if (matchedSig)          reasons.push(`Body contains "${matchedSig}"`);
            if (hasGeneratedComment) reasons.push(`Files contain AI-generation comment`);
            if (hasCIBypassInFiles)  reasons.push(`Explicit CI bypass in file content`);
            if (hasEmptyFiles)       reasons.push(`Empty files (0 bytes) submitted`);
            if (hasCoreFileDeletion) reasons.push(`ATTACK: Deletes core files: ${coreFilesDeleted.slice(0,5).join(', ')}`);

            console.log(`🚨 BOT/ATTACK DETECTED on #${issueNumber} by @${author}`);
            reasons.forEach(r => console.log(`   ↳ ${r}`));

            // ── Ensure labels exist ───────────────────────────────────────────
            const labelDefs = {
              'ai-slop':       { color: 'FF0000', desc: 'AI-generated / cron-bot — not eligible for GSSoC points' },
              'gssoc:invalid': { color: 'B60205', desc: 'Invalid GSSoC submission' },
              'spam':          { color: 'EE0701', desc: 'Spam' },
            };
            for (const [name, meta] of Object.entries(labelDefs)) {
              try {
                await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name });
              } catch(e) {
                try {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner, repo: context.repo.repo,
                    name, color: meta.color, description: meta.desc
                  });
                } catch(ee) {}
              }
            }

            // ── Apply labels ──────────────────────────────────────────────────
            try {
              // No 'spam' label — bot PRs can stay open and get merged (owner earns points, bot gets no GSSoC credit)
              const labelsToAdd = ['ai-slop', 'gssoc:invalid'];
              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issueNumber, labels: labelsToAdd,
              });
              for (const label of ['gssoc:approved', 'accepted', 'integrated', 'maintainer-approved']) {
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner, repo: context.repo.repo,
                    issue_number: issueNumber, name: label,
                  });
                } catch(e) {}
              }
            } catch(e) { console.log('Label error:', e.message); }

            // ── Only comment + close on SABOTAGE (core file deletion) ─────────
            // Normal ai-slop: silently tag only, leave PR open to merge
            if (hasCoreFileDeletion) {
              try {
                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: `## 🚨 Sabotage Attempt Detected\n\n@${author}, this PR has been automatically closed because it deletes core framework files:\n\n${coreFilesDeleted.map(f => '- ' + f).join('\n')}\n\nDeleting .github/workflows/ or other framework files is not permitted.\n\n_— EaseMotion CSS Anti-Bot System_`,
                });
              } catch(e) { console.log('Comment error:', e.message); }
            }

            // ── Auto-close ONLY sabotage PRs (core-file deletion) ────────────
            // Regular ai-slop: leave open so they merge and owner gets contribution points
            if (isPR && hasCoreFileDeletion) {
              try {
                await github.rest.pulls.update({
                  owner: context.repo.owner, repo: context.repo.repo,
                  pull_number: issueNumber, state: 'closed',
                });
                console.log(`🔒 Closed sabotage PR #${issueNumber}`);
              } catch(e) { console.log('Close error:', e.message); }
            }

            console.log(`✅ Tagged #${issueNumber} — ai-slop + gssoc:invalid. Open to merge (owner gets points, @${author} gets nothing).`);
